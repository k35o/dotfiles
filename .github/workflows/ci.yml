name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run lint and format check
        run: pnpm check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Run shellcheck
        run: git ls-files -z '*.sh' | xargs -0 -r shellcheck

  chezmoi:
    name: chezmoi verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Run chezmoi apply --dry-run
        env:
          CHEZMOI_HOME: ${{ runner.temp }}/chezmoi-home
        run: |
          mkdir -p "$CHEZMOI_HOME/.config/chezmoi"
          cat > "$CHEZMOI_HOME/.config/chezmoi/chezmoi.toml" <<'EOF'
          [data]
          profile = "personal"
          EOF
          HOME="$CHEZMOI_HOME" chezmoi apply \
            --dry-run \
            --verbose \
            --source "$GITHUB_WORKSPACE"
