name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run lint and format check
        run: pnpm check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: true

      - name: Run shellcheck
        run: git ls-files -z '*.sh' | xargs -0 -r shellcheck

  chezmoi:
    name: chezmoi verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: true

      - name: Run chezmoi apply --dry-run
        env:
          CHEZMOI_HOME: ${{ runner.temp }}/chezmoi-home
        run: |
          mkdir -p "$CHEZMOI_HOME/.config/chezmoi"
          cat > "$CHEZMOI_HOME/.config/chezmoi/chezmoi.toml" <<'EOF'
          [data]
          profile = "personal"
          EOF
          HOME="$CHEZMOI_HOME" chezmoi apply \
            --dry-run \
            --verbose \
            --source "$GITHUB_WORKSPACE"
